<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- "The Dart" (logo direction 1a): a paper dart mid-flight on the coral
       tile — send, but aimed. Geometry scaled from the 76px design spec. -->
  <rect width="64" height="64" rx="17" fill="#e2603f"/>
  <!-- dart -->
  <rect x="20.2" y="20.2" width="23.6" height="23.6" rx="3.4" fill="#ffffff"
        transform="rotate(45 32 32)"/>
  <!-- motion echo, trailing lower-left -->
  <rect x="11.8" y="37" width="11" height="11" rx="1.7" fill="#ffffff" opacity="0.45"
        transform="rotate(45 17.3 42.5)"/>
</svg>
